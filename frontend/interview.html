<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Interview - CareerPilot AI</title>
    
    <link rel="stylesheet" href="interview.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="interview-body">

    <div id="interview-setup" style="display: none;"></div>

    <header class="dash-header">
        <h1 class="logo">CareerPilot AI</h1>
        <div class="session-info">
            <span class="pulse-dot"></span>
            <span id="round-indicator">Live Interview: Full Stack Developer</span>
        </div>
        <a href="dashboard.html" class="exit-btn">Leave Session</a>
    </header>

    <main class="simulator-container" id="interview-arena">

        <section class="video-panel">
            
            <div class="video-feed main-feed">
                <div class="ai-avatar pulse">🤖</div>
                <div class="feed-label">AI Interviewer</div>
            </div>

            <div class="video-feed user-feed">
                <div class="user-placeholder">👤</div>
                <div class="feed-label">You</div>
            </div>

            <div class="controls">
                <button id="mute-btn" class="control-btn">🎙️ Mute</button>
                <button id="mic-type-btn" class="control-btn" style="background: rgba(255,255,255,0.1);">🎙️ Start Speaking</button>
                <button id="camera-btn" class="control-btn">📷 Camera Off</button>
                <button id="end-interview-btn" class="control-btn end-call" onclick="forceEndInterview()">End Interview</button>
            </div>

        </section>

        <section class="transcript-panel" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
            <div class="transcript-header">
                <h3>Live Transcript</h3>
                <span class="ai-status">AI is listening...</span>
            </div>

            <div class="chat-box" id="transcript-container" style="flex: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px;">
                </div>

            <div class="chat-input-group" style="display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: auto;">
                <textarea 
                    id="user-answer" 
                    placeholder="Type your technical answer here..." 
                    rows="2" 
                    style="flex: 1; background: #1e1e2e; color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 10px; resize: none; font-family: 'Poppins', sans-serif;"
                ></textarea>
                <button 
                    id="submit-answer-btn" 
                    style="background: #a855f7; color: white; border: none; border-radius: 6px; padding: 0 20px; font-weight: 600; cursor: pointer; transition: background 0.2s;"
                >
                    Send
                </button>
            </div>
        </section>

    </main>

    <div id="report-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Interview Performance Report</h2>
                <span class="close-modal-btn" onclick="document.getElementById('report-modal').style.display='none'">&times;</span>
            </div>
            
            <div class="modal-body">
                <div class="score-container">
                    <div class="score-badge">
                        <span id="modal-score-num">9</span>
                        <small>/ 10</small>
                    </div>
                    <h3>Overall Performance Rating</h3>
                </div>

                <hr class="modal-divider">

                <div class="feedback-section">
                    <h4><span class="icon">📝</span> Detailed Assessment</h4>
                    <p id="modal-assessment">Analyzing your transcripts...</p>
                </div>
            </div>

            <div class="modal-footer">
                <button class="modal-secondary-btn" onclick="document.getElementById('report-modal').style.display='none'">Back to Chat View</button>
                <button class="modal-action-btn" onclick="window.location.reload()">Start New Session 🔁</button>
            </div>
        </div>
    </div>

    <script src="mock_interview.js"></script>

    <!-- 🌟 THE SESSION INITIALIZATION HANDSHAKE FIX -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById("transcript-container");
            const roundIndicator = document.getElementById("round-indicator");
            
            if (!container) return;

            // 1. Force clear any stuck session memories by hitting your backend start endpoint first!
            try {
                const startRes = await fetch("http://127.0.0.1:5000/start-interview", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic: "Software Developer" })
                });

                if (startRes.ok) {
                    console.log("🚀 Fresh backend interview context initialized successfully.");
                    if (roundIndicator) roundIndicator.innerText = "Question 1 of 5";
                }
            } catch (err) {
                console.error("⚠️ Failed to reach Python server for initialization context:", err);
            }

            // 2. Fire the welcoming greeting message cleanly into the chat stream and speech pipe
            if (typeof appendMessage === "function") {
                setTimeout(() => {
                    appendMessage("ai", "Hello! I am your AI interviewer. Today we will be focusing on your Full Stack development skills, specifically Java and MySQL. Are you ready to begin?");
                }, 400);
            }
        });
    </script>
</body>
</html>
